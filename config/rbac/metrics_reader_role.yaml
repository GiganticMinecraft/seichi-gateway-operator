# This rule is not used by the project seichi-gateway-operator itself.
# It is provided to allow the cluster admin to have permissions to read the metrics.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: metrics-reader
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: seichi-gateway-operator
    app.kubernetes.io/part-of: seichi-gateway-operator
    app.kubernetes.io/managed-by: kustomize
  name: metrics-reader
rules:
- nonResourceURLs:
  - "/metrics"
  verbs:
  - get
