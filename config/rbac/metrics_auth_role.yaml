# This rule is not used by the project seichi-gateway-operator itself.
# It is provided to allow the cluster admin to have permissions to authenticate and authorize
# requests to the metrics endpoint.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: metrics-auth-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: seichi-gateway-operator
    app.kubernetes.io/part-of: seichi-gateway-operator
    app.kubernetes.io/managed-by: kustomize
  name: metrics-auth-role
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
