# This rule is not used by the project seichi-gateway-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to seichiclick.seichi.click resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: seichi-gateway-operator
    app.kubernetes.io/managed-by: kustomize
  name: seichiassistdebugenvrequest-viewer-role
rules:
- apiGroups:
  - seichiclick.seichi.click
  resources:
  - seichiassistdebugenvrequests
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - seichiclick.seichi.click
  resources:
  - seichiassistdebugenvrequests/status
  verbs:
  - get
